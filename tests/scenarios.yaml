# Azure AD Revoke Session Test Scenarios
action:
  params:
    userPrincipalName: testuser@yourtenant.onmicrosoft.com
  context:
    secrets:
      OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET: test-client-secret
    environment:
      ADDRESS: https://graph.microsoft.com
      OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL: https://login.microsoftonline.com/test-tenant/oauth2/v2.0/token
      OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID: test-client-id
      OAUTH2_CLIENT_CREDENTIALS_SCOPE: https://graph.microsoft.com/.default

scenarios:
  - name: successfully revoke sessions for user
    steps:
      - request:
          method: POST
          url: https://login.microsoftonline.com/test-tenant/oauth2/v2.0/token
          headers:
            Content-Type: application/x-www-form-urlencoded
        fixture: fixtures/200-oauth-token.http
      - request:
          method: POST
          url: https://graph.microsoft.com/v1.0/users/testuser%40yourtenant.onmicrosoft.com/revokeSignInSessions
        fixture: fixtures/200-success.http
    invoke:
      returns:
        status: success
        userPrincipalName: testuser@yourtenant.onmicrosoft.com
        value: true
        address: https://graph.microsoft.com

  - name: idempotent - second call succeeds with no active sessions
    steps:
      - request:
          method: POST
          url: https://login.microsoftonline.com/test-tenant/oauth2/v2.0/token
          headers:
            Content-Type: application/x-www-form-urlencoded
        fixture: fixtures/200-oauth-token.http
      - request:
          method: POST
          url: https://graph.microsoft.com/v1.0/users/testuser%40yourtenant.onmicrosoft.com/revokeSignInSessions
        fixture: fixtures/200-success.http
    invoke:
      returns:
        status: success
        userPrincipalName: testuser@yourtenant.onmicrosoft.com
        value: true
        address: https://graph.microsoft.com

  - name: user not found
    steps:
      - request:
          method: POST
          url: https://login.microsoftonline.com/test-tenant/oauth2/v2.0/token
          headers:
            Content-Type: application/x-www-form-urlencoded
        fixture: fixtures/200-oauth-token.http
      - request:
          method: POST
          url: https://graph.microsoft.com/v1.0/users/testuser%40yourtenant.onmicrosoft.com/revokeSignInSessions
        fixture: fixtures/404-user-not-found.http
    invoke:
      throws: "Failed to revoke sessions: 404 Not Found"

  - name: unauthorized - invalid token
    steps:
      - request:
          method: POST
          url: https://login.microsoftonline.com/test-tenant/oauth2/v2.0/token
          headers:
            Content-Type: application/x-www-form-urlencoded
        fixture: fixtures/200-oauth-token.http
      - request:
          method: POST
          url: https://graph.microsoft.com/v1.0/users/testuser%40yourtenant.onmicrosoft.com/revokeSignInSessions
        fixture: fixtures/401-unauthorized.http
    invoke:
      throws: "Failed to revoke sessions: 401 Unauthorized"

  - name: insufficient permissions
    steps:
      - request:
          method: POST
          url: https://login.microsoftonline.com/test-tenant/oauth2/v2.0/token
          headers:
            Content-Type: application/x-www-form-urlencoded
        fixture: fixtures/200-oauth-token.http
      - request:
          method: POST
          url: https://graph.microsoft.com/v1.0/users/testuser%40yourtenant.onmicrosoft.com/revokeSignInSessions
        fixture: fixtures/403-forbidden.http
    invoke:
      throws: "Failed to revoke sessions: 403 Forbidden"

  - name: server error
    steps:
      - request:
          method: POST
          url: https://login.microsoftonline.com/test-tenant/oauth2/v2.0/token
          headers:
            Content-Type: application/x-www-form-urlencoded
        fixture: fixtures/200-oauth-token.http
      - request:
          method: POST
          url: https://graph.microsoft.com/v1.0/users/testuser%40yourtenant.onmicrosoft.com/revokeSignInSessions
        fixture: fixtures/500-internal-server.http
    invoke:
      throws: "Failed to revoke sessions: 500 Internal Server Error"